<!DOCTYPE html>
<html lang="da">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Klasse-chat</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: sans-serif; background: #f5f5f5; height: 100vh; display: flex; flex-direction: column; }
    header { background: #4f46e5; color: white; padding: 1rem 1.25rem; font-size: 1.1rem; font-weight: bold; display: flex; align-items: center; gap: 8px; }
    .dot { width: 8px; height: 8px; background: #86efac; border-radius: 50%; }
    #chat { flex: 1; overflow-y: auto; padding: 1rem; display: flex; flex-direction: column; gap: 8px; }
    .msg { background: white; border-radius: 12px; padding: 10px 14px; max-width: 75%; box-shadow: 0 1px 2px rgba(0,0,0,0.08); }
    .msg.mine { align-self: flex-end; background: #4f46e5; color: white; }
    .msg .name { font-size: 11px; font-weight: 600; margin-bottom: 3px; opacity: 0.65; }
    .msg .text { font-size: 14px; line-height: 1.4; }
    .msg .time { font-size: 10px; opacity: 0.45; margin-top: 4px; text-align: right; }
    #form { display: flex; gap: 8px; padding: 1rem; background: white; border-top: 1px solid #eee; }
    #username { width: 110px; padding: 10px; border: 1px solid #ddd; border-radius: 8px; font-size: 13px; }
    #message { flex: 1; padding: 10px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; }
    button { background: #4f46e5; color: white; border: none; padding: 10px 18px; border-radius: 8px; cursor: pointer; font-size: 14px; font-weight: 500; }
    button:hover { background: #4338ca; }
    #username:focus, #message:focus { outline: none; border-color: #4f46e5; }
  </style>
</head>
<body>
  <header>
    <span class="dot"></span>
    💬 Klasse-chat-Y1!
  </header>
  <div id="chat"></div>
  <div id="form">
    <input id="username" placeholder="Dit navn" maxlength="20">
    <input id="message" placeholder="Skriv en besked..." maxlength="500">
    <button onclick="sendMessage()">Send</button>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    const socket = io()
    const chatEl = document.getElementById('chat')

    function getUsername() {
      return document.getElementById('username').value.trim()
    }

    function formatTime(dateStr) {
      return new Date(dateStr).toLocaleTimeString('da-DK', {
        hour: '2-digit', minute: '2-digit'
      })
    }

    function addMessage(m, scroll = true) {
      const div = document.createElement('div')
      div.className = 'msg' + (m.username === getUsername() ? ' mine' : '')
      div.innerHTML = `
        <div class="name">${m.username}</div>
        <div class="text">${m.message}</div>
        <div class="time">${formatTime(m.created_at)}</div>
      `
      chatEl.appendChild(div)
      if (scroll) chatEl.scrollTop = chatEl.scrollHeight
    }

    // Modtag historik når man forbinder
    socket.on('historik', (messages) => {
      chatEl.innerHTML = ''
      messages.forEach(m => addMessage(m, false))
      chatEl.scrollTop = chatEl.scrollHeight
    })

    // Modtag ny besked øjeblikkeligt
    socket.on('besked', (m) => {
      addMessage(m)
    })

    function sendMessage() {
      const message = document.getElementById('message').value.trim()
      const username = getUsername()
      if (!message || !username) return alert('Udfyld navn og besked')

      socket.emit('besked', { username, message })
      document.getElementById('message').value = ''
    }

    document.getElementById('message').addEventListener('keydown', e => {
      if (e.key === 'Enter') sendMessage()
    })
  </script>
</body>
</html>
