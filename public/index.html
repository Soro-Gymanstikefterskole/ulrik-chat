<!DOCTYPE html>
<html lang="da">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
  <title>Klasse-chat v2</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html { height: -webkit-fill-available; }
    body {
      font-family: sans-serif;
      background: #f5f5f5;
      height: 100vh;
      height: 100dvh;
      height: -webkit-fill-available;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      -webkit-text-size-adjust: 100%;
    }
    header {
      background: #4f46e5; color: white;
      padding: calc(0.75rem + env(safe-area-inset-top)) 1.25rem 0.75rem;
      font-size: 1.1rem; font-weight: bold;
      display: flex; align-items: center; gap: 8px;
      flex-shrink: 0;
    }
    .dot { width: 8px; height: 8px; background: #86efac; border-radius: 50%; flex-shrink: 0; }
    #chat {
      flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; overscroll-behavior: contain;
      padding: 1rem; display: flex; flex-direction: column; gap: 8px;
    }
    .msg { background: white; border-radius: 12px; padding: 10px 14px; max-width: 85%; box-shadow: 0 1px 2px rgba(0,0,0,0.08); word-break: break-word; }
    .msg.mine { align-self: flex-end; background: #4f46e5; color: white; }
    .msg .name { font-size: 11px; font-weight: 600; margin-bottom: 3px; opacity: 0.65; }
    .msg .text { font-size: 14px; line-height: 1.4; }
    .msg .time { font-size: 10px; opacity: 0.45; margin-top: 4px; text-align: right; }
    #form {
      display: flex; flex-wrap: wrap; gap: 8px;
      padding: 0.75rem 1rem calc(0.75rem + env(safe-area-inset-bottom));
      background: white; border-top: 1px solid #eee;
      flex-shrink: 0;
    }
    #username { flex: 1 1 90px; min-width: 0; padding: 12px 10px; border: 1px solid #ddd; border-radius: 8px; font-size: 16px; }
    #message { flex: 3 1 150px; min-width: 0; padding: 12px 10px; border: 1px solid #ddd; border-radius: 8px; font-size: 16px; }
    button {
      background: #4f46e5; color: white; border: none; padding: 12px 18px; border-radius: 8px;
      cursor: pointer; font-size: 15px; font-weight: 500;
      min-height: 44px;
      flex-shrink: 0;
    }
    button:hover { background: #4338ca; }
    button:active { background: #3730a3; }
    #username:focus, #message:focus { outline: none; border-color: #4f46e5; }
  </style>
</head>
<body>
  <header>
    <span class="dot"></span>
    💬 Klasse-chat-Y1! DET VIRKER.
  </header>
  <div id="chat"></div>
  <div id="form">
    <input id="username" placeholder="Dit navn" maxlength="20">
    <input id="message" placeholder="Skriv en besked..." maxlength="500">
    <button onclick="sendMessage()">Send</button>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    const socket = io()
    const chatEl = document.getElementById('chat')

    function getUsername() {
      return document.getElementById('username').value.trim()
    }

    function formatTime(dateStr) {
      return new Date(dateStr).toLocaleTimeString('da-DK', {
        hour: '2-digit', minute: '2-digit'
      })
    }

    function addMessage(m, scroll = true) {
      const div = document.createElement('div')
      div.className = 'msg' + (m.username === getUsername() ? ' mine' : '')
      div.innerHTML = `
        <div class="name">${m.username}</div>
        <div class="text">${m.message}</div>
        <div class="time">${formatTime(m.created_at)}</div>
      `
      chatEl.appendChild(div)
      if (scroll) chatEl.scrollTop = chatEl.scrollHeight
    }

    // Modtag historik når man forbinder
    socket.on('historik', (messages) => {
      chatEl.innerHTML = ''
      messages.forEach(m => addMessage(m, false))
      chatEl.scrollTop = chatEl.scrollHeight
    })

    // Modtag ny besked øjeblikkeligt
    socket.on('besked', (m) => {
      addMessage(m)
    })

    function sendMessage() {
      const message = document.getElementById('message').value.trim()
      const username = getUsername()
      if (!message || !username) return alert('Udfyld navn og besked')

      socket.emit('besked', { username, message })
      document.getElementById('message').value = ''
    }

    document.getElementById('message').addEventListener('keydown', e => {
      if (e.key === 'Enter') sendMessage()
    })

    // Hold chatten scrollet til bunden når tastaturet åbner på iPhone
    const scrollToBottom = () => { chatEl.scrollTop = chatEl.scrollHeight }
    document.getElementById('message').addEventListener('focus', () => setTimeout(scrollToBottom, 300))
    document.getElementById('username').addEventListener('focus', () => setTimeout(scrollToBottom, 300))
    if (window.visualViewport) {
      window.visualViewport.addEventListener('resize', scrollToBottom)
    }
  </script>
</body>
</html>
